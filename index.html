<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart.js</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header text-center">
    <h1 class="title">CampusCart</h1>
    <p class="credit">by Bernard Llagas of S16 Team 1</p>
  </header>
  <main class="container wrapper">
    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card">
          <h2 class="chart-title">Listings Per Month</h2>
          <div class="chart-box">
            <canvas id="listingsBarChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="card">
          <h2 class="chart-title">Reports Submitted Per Month</h2>
          <div class="chart-box">
            <canvas id="reportsLineChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="card">
          <h2 class="chart-title">Most Popular Categories</h2>
          <div class="chart-box">
            <canvas id="categoriesHorizontalChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="charts.js"></script>
</body>
</html>
